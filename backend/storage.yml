services:
    redis:
        image: redis:8.4.0
        container_name: redis-akiora
        restart: always
        ports:
            - "6379:6379"
        volumes:
            - akiora_redis_data:/data
    redis-commander:
        image: rediscommander/redis-commander:latest
        restart: always
        environment:
            REDIS_HOSTS: local:redis:6379
        ports:
            - 8082:8081
        depends_on:
            - redis

volumes:
    akiora_redis_data:
