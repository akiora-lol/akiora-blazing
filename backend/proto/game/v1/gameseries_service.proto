syntax = "proto3";

package akiora.game.gameseries;

import "google/api/annotations.proto";

import "common/game_actors.proto";

import "common/game_draft.proto";
import "common/types.proto";

option go_package = "akiora/game/gameseries";





message ToggleReadyRequest{
    string series_id = 1;
    common.Actor actor = 2;
}

message DraftActionRequest{
    string series_id = 1;
    common.Command command = 2;
}

message ChampLockRequest{
    string series_id = 1;
    common.ChampLock champ_lock = 2;
}

// Host-only: report the winner of one game in a series. The backend
// propagates the result through the tournament bracket and finishes the
// tournament automatically once the final match is decided.
message SetGameWinnerRequest{
    string series_id = 1;
    string game_id = 2;
    string actor_id = 3;            // caller — must be the tournament host
    common.Actor winner = 4;        // winning team participant
}

service GameSeriesService {

    // Действие в драфте
    rpc DraftAction(DraftActionRequest) returns (common.Empty) {
        option (google.api.http) = {
            post: "/v1/game-series/{series_id}/draft/action"
            body: "*"
        };
    }

    // Переключение готовности
    rpc ToggleReady(ToggleReadyRequest) returns (common.Empty) {
        option (google.api.http) = {
            post: "/v1/game-series/{series_id}/ready"
            body: "*"
        };
    }

    // Хост турнира выставляет победителя одной игры.
    rpc SetGameWinner(SetGameWinnerRequest) returns (common.Empty) {
        option (google.api.http) = {
            post: "/v1/game-series/{series_id}/games/{game_id}/winner"
            body: "*"
        };
    }

    // (Опционально) Лок чемпиона
    // rpc ChampLock(ChampLockRequest) returns (common.Empty) { ... }
}
