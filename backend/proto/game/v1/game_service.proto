syntax = "proto3";

package akiora.game;

message CreateUserRequest {
  string email = 1;
  string name = 2;
}

enum Game {
  ANY = 0;
  LOL = 1;
  TFT = 2;
  VALO = 2;
}

message Social {
  string link = 1;
  bool hide = 2;
}

message PatchUserRequest {
  string email = 1;
  string name = 2;
  string bio = 3;
  Gender gender = 4;
  string birthday = 5;
  repeated Social socials = 6;
}

message UserResponse {
  string email = 1;
  string name = 2;
  string bio = 3;
  Gender gender = 4;
  string birthday = 5;
  repeated Social socials = 6;
  string id = 7;
}

message GetUserRequest {
  string id = 1;
  string email = 2;
}

service UserService {
  rpc CreateUser(CreateUserRequest) returns (UserResponse);
  rpc UpdateUser(PatchUserRequest) returns (UserResponse);
  rpc GetUser(GetUserRequest) returns (UserResponse);
}
