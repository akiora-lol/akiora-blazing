syntax = "proto3";

package akiora.game.tournament;

import "common/game_actors.proto";
import "common/game_settings.proto";
import "common/types.proto";

option go_package = "akiora/game/tournament";

enum TournamentType{
    UNSPECIFIED = 0;
    PRESIGN =1;
    PICKEM =2;
}

message LolTournamentSettings {
    TournamentType tournament_type = 1;
  common.LolBracketMode bracket_mode = 2;
  repeated common.LolGameMode draft_mode = 3;
  uint32 team_size = 4;
  uint32 map = 5;
  repeated uint32 forbidden_champions = 6;
  repeated uint32 series_best_of = 7;
}



message TftTournamentSettings {
  string todo = 1;
}

message ValorantTournamentSettings {
  string todo = 1;
}

message TournamentSettings {
  common.GameType game_type = 1;
  oneof settings {
    LolTournamentSettings lol = 2;
    TftTournamentSettings tft = 3;
    ValorantTournamentSettings valorant = 4;
  }
}

message CreateTournamentRequest {
  common.Actor host = 1;  
  TournamentSettings settings = 3;
  uint64 start = 4;
  string prizepool = 5;
}

message GetTournamentRequest {
  repeated string ids = 1;
  optional common.GameType game_type = 2;
}

message TournamentResponse {
  string id = 1;
  common.Actor host = 2;
  repeated common.Actor participants = 3;
  TournamentSettings settings = 4;
  repeated string game_series_ids = 5;
  uint64 start = 6;
  optional uint64 end = 7;
  common.Status status = 8;
  string prizepool = 9;
}

message ManyTournamentsResponse {
  repeated TournamentResponse tournaments = 1;
}



service TournamentService {
  // Создание турнира
  rpc CreateTournament(CreateTournamentRequest) returns (TournamentResponse);

  // Получение турнира по ID
  rpc GetTournament(GetTournamentRequest) returns (TournamentResponse);

  // Получение списка турниров
  rpc GetTournaments(GetTournamentRequest) returns (ManyTournamentsResponse);

  // Запуск турнира (создаёт сетку/расписание)
  rpc StartTournament(GetTournamentRequest) returns (TournamentResponse);

  // Завершение турнира
  rpc FinishTournament(GetTournamentRequest) returns (TournamentResponse);

  // Добавление участника
  rpc AddParticipant(AddParticipantRequest) returns (TournamentResponse);

  rpc AddParticipantToWaitList(AddParticipantRequest) returns (TournamentResponse);

  // Удаление участника
  rpc RemoveParticipant(RemoveParticipantRequest) returns (TournamentResponse);
}

message AddParticipantRequest {
  string tournament_id = 1;
  common.Actor participant = 2;
  optional common.TeamParticipant team_participant = 3;
}


message RemoveParticipantRequest {
  string tournament_id = 1;
  string participant_id = 2;
}
