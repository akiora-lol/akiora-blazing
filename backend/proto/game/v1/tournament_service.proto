syntax = "proto3";

package akiora.game.tournament;

import "google/api/annotations.proto";

import "google/api/http.proto";
import "common/game_actors.proto";
import "common/game_settings.proto";
import "common/types.proto";

option go_package = "akiora/game/tournament";

service TournamentService {
  // Создание турнира
  rpc CreateTournament(CreateTournamentRequest) returns (common.Empty) {
    option (google.api.http) = {
      post: "/v1/tournaments"
      body: "*"
    };
  }

  // Получение одного или нескольких турниров по ID
  rpc GetTournament(GetTournamentRequest) returns (ManyTournamentsResponse) {  // лучше возвращать ManyTournamentsResponse
    option (google.api.http) = {
      get: "/v1/tournaments/{ids}"
    };
  }

  // Получение списка турниров (с фильтром по game_type)
  rpc GetTournaments(GetTournamentRequest) returns (ManyTournamentsResponse) {
    option (google.api.http) = {
      get: "/v1/tournaments"
    };
  }

  // Запуск турнира
  rpc StartTournament(GetTournamentRequest) returns (common.Empty) {
    option (google.api.http) = {
      post: "/v1/tournaments/{ids}/start"
    };
  }

  // Предварительная сборка брекета
  rpc PreBuildBracket(GetTournamentRequest) returns (common.Empty) {
    option (google.api.http) = {
      post: "/v1/tournaments/{ids}/prebuild-bracket"
    };
  }

  // Завершение турнира
  rpc FinishTournament(GetTournamentRequest) returns (common.Empty) {
    option (google.api.http) = {
      post: "/v1/tournaments/{ids}/finish"
    };
  }

  // Добавление участника (одиночного)
  rpc AddParticipant(AddParticipantRequest) returns (common.Empty) {
    option (google.api.http) = {
      post: "/v1/tournaments/{tournament_id}/participants"
      body: "*"
    };
  }

  // Добавление команды
  rpc AddTeam(AddTeamParticipantRequest) returns (common.Empty) {
    option (google.api.http) = {
      post: "/v1/tournaments/{tournament_id}/teams"
      body: "*"
    };
  }

  // Добавление в лист ожидания
  rpc AddParticipantToWaitList(AddParticipantRequest) returns (common.Empty) {
    option (google.api.http) = {
      post: "/v1/tournaments/{tournament_id}/waitlist"
      body: "*"
    };
  }

  // Смена мест в брекете
  rpc ChangeBracket(ChangeBracketRequest) returns (common.Empty) {
    option (google.api.http) = {
      post: "/v1/tournaments/{tournament_id}/bracket/swap"
      body: "*"
    };
  }

  // Удаление участника
  rpc RemoveParticipant(RemoveParticipantRequest) returns (common.Empty) {
    option (google.api.http) = {
      delete: "/v1/tournaments/{tournament_id}/participants/{participant_id}"
    };
  }
}
enum TournamentType {
  UNSPECIFIED = 0;
  PRESIGN = 1;
  PICKEM = 2;
}

message LolTournamentSettings {
  TournamentType tournament_type = 1;
  common.LolBracketMode bracket_mode = 2;
  repeated common.LolGameMode draft_mode = 3;
  uint32 team_size = 4;
  uint32 map = 5;
  repeated uint32 forbidden_champions = 6;
  repeated uint32 series_best_of = 7;
}

message TftTournamentSettings {
  string todo = 1;
}

message ValorantTournamentSettings {
  string todo = 1;
}

message TournamentSettings {
  common.GameType game_type = 1;
  oneof settings {
    LolTournamentSettings lol = 2;
    TftTournamentSettings tft = 3;
    ValorantTournamentSettings valorant = 4;
  }
}

message CreateTournamentRequest {
  common.Actor host = 1;
  TournamentSettings settings = 3;
  int64 start = 4;
  string prizepool = 5;
  bool is_open = 6;
}

message GetTournamentRequest {
  repeated string ids = 1;
  optional common.GameType game_type = 2;
}

message TournamentResponse {
  string id = 1;
  common.Actor host = 2;
  repeated common.Actor participants = 3;
  TournamentSettings settings = 4;
  repeated string game_series_ids = 5;
  int64 start = 6;
  optional int64 end = 7;
  common.Status status = 8;
  string prizepool = 9;
}

message ManyTournamentsResponse {
  repeated TournamentResponse tournaments = 1;
}

 


message ChangeBracketRequest {
  string tournament_id = 1;
  common.Actor swap_initiator = 2;
  common.Actor swap_victim = 3;
}
message AddParticipantRequest {
  string tournament_id = 1;

  common.Actor participant = 2;
 

}
message AddTeamParticipantRequest {
  string tournament_id = 1;

  common.TeamParticipant team_participant = 2;
 

}

message RemoveParticipantRequest {
  string tournament_id = 1;
  string participant_id = 2;
}
