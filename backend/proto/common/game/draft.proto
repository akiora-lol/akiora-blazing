syntax = "proto3";

package akiora.common.game.draft;

import "common/game/actors.proto";
option go_package = "akiora/common/game/draft";


message Command {
  Team team = 1;
  Action action = 2;
}

enum TeamType {
  UNSPECIFIED = 0;
  RED = 1;
  BLUE = 2;
}
message Team {
    common.Actor actor = 1;
    TeamType type = 2;
}

message Action {
  oneof action_type {
    int32 pick = 1; 
    int32 ban = 2; 
  }
}

message ChampLock {
  int32 champion_id = 1;
  string player_id = 2;
}
