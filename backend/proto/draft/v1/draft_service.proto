syntax = "proto3";

package akiora.draft;

import "common/game/settings.proto";
import "common/game/draft.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

option go_package = "akiora/draft";

message Empty{

}

message PrepareDraftRequest{
    string game_id = 1;
    repeated int32 forbidden_champions = 2;
    repeated common.game.Team teams = 3;
    int32 seconds_per_action = 4;
    common.game.GameSettings settings = 5;
    bool allow_redo = 6;
}

message PerformDraftActionRequest{
    string game_id = 1;
    common.game.Command command = 2;
}

message RedoRequest{
    string game_id = 1;
    common.game.Team team = 2;
}

service DraftService {
  rpc PrepareDraft(PrepareDraftRequest) returns (Empty);
  rpc PerformDraftAction(PerformDraftActionRequest) returns (Empty);
  rpc AskForRedo(RedoRequest) returns (Empty);  
  rpc AllowRedo(RedoRequest) returns (Empty);   
}
