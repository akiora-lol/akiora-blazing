syntax = "proto3";

package akiora.community.club;

option java_multiple_files = true;
option java_package = "akiora.club.grpc.proto";

message CreateClubRequest {
  string owner_id = 1;
  string name = 2;
}

message PatchClubRequest {
  string owner_id = 1;
  string name = 2;
  repeated string add_users = 3;
  repeated string delete_users = 4;
}

message ClubResponse {
  string id = 1;
  string owner_id = 2;
  string name = 3;
  repeated string users = 4;
}

message GetClubRequest {
  string id = 1;
}

service ClubService {
  rpc CreateClub(CreateClubRequest) returns (ClubResponse);
  rpc UpdateClub(PatchClubRequest) returns (ClubResponse);
  rpc GetClub(GetClubRequest) returns (ClubResponse);
}
