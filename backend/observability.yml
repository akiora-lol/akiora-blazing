services:
  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: prometheus-akiora
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - akiora_prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - backend_akiora

  loki:
    image: grafana/loki:3.2.1
    container_name: loki-akiora
    restart: unless-stopped
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./config/loki-config.yml:/etc/loki/local-config.yaml:ro
      - akiora_loki_data:/loki
    ports:
      - "3100:3100"
    networks:
      - backend_akiora

  promtail:
    image: grafana/promtail:3.2.1
    container_name: promtail-akiora
    restart: unless-stopped
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./config/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    depends_on:
      - loki
    networks:
      - backend_akiora

  grafana:
    image: grafana/grafana:11.3.0
    container_name: grafana-akiora
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - akiora_grafana_data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./config/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
      - loki
    networks:
      - backend_akiora

volumes:
  akiora_prometheus_data:
  akiora_loki_data:
  akiora_grafana_data:

networks:
  backend_akiora:
    driver: bridge
