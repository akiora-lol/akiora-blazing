include:
    - storage.yml
services:
    gameservice:
        build:
            context: .
            dockerfile: rust/services/game/Dockerfile
        container_name: gameservice
        ports:
            - "8003:50051"

        environment:
            MONGODB_URI: mongodb://mongodb:27017/?replicaSet=rs0

            MONGODB_DATABASE: game_db

        depends_on:
            - mongodb

        restart: unless-stopped

        networks:
            - backend_akiora

    draft:
        build:
            context: .
            dockerfile: rust/services/draft/Dockerfile
        container_name: draftworker

        depends_on:
            - redis

        environment:
            REDIS_URI: redis://redis:6379

        restart: unless-stopped

        networks:
            - backend_akiora
