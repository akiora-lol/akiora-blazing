version: '3.9'
include:
    - backend/storage.yml
    - backend/observability.yml
services:
  

  auth:
    build:
      context: ./backend/python
      dockerfile: auth/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      APP_NAME: auth
      mongo_url: mongodb://mongodb:27017/?replicaSet=rs0
      redis_url: redis://redis:6379/0
      COMMUNITY_GRPC_ADDRESS: community:50051
      
    networks:
      - backend_akiora
    depends_on :
      - mongodb
      - redis
    restart: unless-stopped

  community:
    build:
      context: ./backend/python
      dockerfile: community/Dockerfile
    ports:
      - "50051:50051"
      - "9101:9100"
    env_file:
      - .env
    environment:
      APP_NAME: community
      mongo_url: mongodb://mongodb:27017/?replicaSet=rs0
      redis_url: redis://redis:6379/0
    networks:
      - backend_akiora

    depends_on :
      - mongodb
      - redis
    restart: unless-stopped

  messenger:
    build:
      context: ./backend/python
      dockerfile: messenger/Dockerfile
    ports:
      - "50052:50051"
      - "9102:9100"
    env_file:
      - .env
    environment:
      APP_NAME: messenger
      mongo_url: mongodb://mongodb:27017/?replicaSet=rs0
      redis_url: redis://redis:6379/0
    networks:
      - backend_akiora
    depends_on :
      - mongodb
      - redis
    restart: unless-stopped

  game:
    build:
      context: ./backend/python
      dockerfile: game/Dockerfile
    ports:
      - "50053:50051"
      - "9103:9100"
    env_file:
      - .env
    environment:
      APP_NAME: game
      mongo_url: mongodb://mongodb:27017/?replicaSet=rs0
      redis_url: redis://redis:6379/0
    networks:
      - backend_akiora
    depends_on :
      - mongodb
      - redis
    restart: unless-stopped

  draft:
    build:
      context: ./backend/python
      dockerfile: draft/Dockerfile
    ports:
      - "50055:50051"
    env_file:
      - .env
    environment:
      APP_NAME: draft
      mongo_url: mongodb://mongodb:27017/?replicaSet=rs0
      redis_url: redis://redis:6379/0
    networks:
      - backend_akiora
    depends_on :
      - mongodb
      - redis
    restart: unless-stopped

  search:
    build:
      context: ./backend/python
      dockerfile: search/Dockerfile
    ports:
      - "50054:50051"
      - "9104:9100"
    env_file:
      - .env
    environment:
      APP_NAME: search
      mongo_url: mongodb://mongodb:27017/?replicaSet=rs0
      redis_url: redis://redis:6379/0
    networks:
      - backend_akiora
    depends_on :
      - mongodb
      - redis
    restart: unless-stopped

  front:
    build:
      context: ./frontend/akiora-v4
      dockerfile: Dockerfile
    ports:
      - "3000:3000"  
    
    networks:
      - backend_akiora
   
    restart: unless-stopped

  gateway:
    build:
      context: ./backend/python
      dockerfile: gateway/Dockerfile
    ports:
      - "8001:8000"
    env_file:
      - .env
    environment:
      APP_NAME: gateway
      COMMUNITY_SERVICE_ADDRESS: community:50051
      MESSENGER_SERVICE_ADDRESS: messenger:50051
      GAME_SERVICE_ADDRESS: game:50051
      search_service_address: search:50051
      mongo_url: mongodb://mongodb:27017/?replicaSet=rs0
      redis_url: redis://redis:6379/0
    depends_on:
      - community
      - messenger
      - game
    networks:
      - backend_akiora
    restart: unless-stopped

  socketgw:
    build:
      context: ./backend/python
      dockerfile: socketgw/Dockerfile
    ports:
      - "8002:8000"
    env_file:
      - .env
    environment:
      APP_NAME: socketgw
      redis_url: redis://redis:6379/0
    networks:
      - backend_akiora
    depends_on:
      - redis
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: hotel_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      
      - DOMAIN=akiora.webhop.me
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/templates:/etc/nginx/templates:ro
      # Same volume backend writes to — nginx serves /api/assets/* from here.
      - backend_assets:/srv/assets:ro
      - ./assets:/srv/static-assets:ro
      # Cert material managed by certbot.
      - letsencrypt_certs:/etc/letsencrypt:ro
      - letsencrypt_www:/var/www/certbot:ro
      - frontend_static:/usr/share/nginx/html/public:ro
      - admin_static:/usr/share/nginx/html/admin:ro
    depends_on:
      - backend
      - frontend
      - admin-frontend
    networks:
      - hotel-network


networks:
  backend_akiora:
    driver: bridge
