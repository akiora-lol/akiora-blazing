version: '3.9'
include:
    - backend/storage.yml
services:
  

  auth:
    build:
      context: ./backend/python
      dockerfile: auth/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      APP_NAME: auth
    networks:
      - backend_akiora
    restart: unless-stopped

  community:
    build:
      context: ./backend/python
      dockerfile: community/Dockerfile
    ports:
      - "50051:50051"
    env_file:
      - .env
    environment:
      APP_NAME: community
    networks:
      - backend_akiora
    restart: unless-stopped

  messenger:
    build:
      context: ./backend/python
      dockerfile: messenger/Dockerfile
    ports:
      - "50052:50051"
    env_file:
      - .env
    environment:
      APP_NAME: messenger
    networks:
      - backend_akiora
    restart: unless-stopped

  game:
    build:
      context: ./backend/python
      dockerfile: game/Dockerfile
    ports:
      - "50053:50051"
    env_file:
      - .env
    environment:
      APP_NAME: game
    networks:
      - backend_akiora
    restart: unless-stopped

  draft:
    build:
      context: ./backend/python
      dockerfile: draft/Dockerfile
    ports:
      - "50054:50051"
    env_file:
      - .env
    environment:
      APP_NAME: draft
    networks:
      - backend_akiora
    restart: unless-stopped

  search:
    build:
      context: ./backend/python
      dockerfile: search/Dockerfile
    ports:
      - "50055:50051"
    env_file:
      - .env
    environment:
      APP_NAME: search
    networks:
      - backend_akiora
    restart: unless-stopped

  gateway:
    build:
      context: ./backend/python
      dockerfile: gateway/Dockerfile
    ports:
      - "8001:8000"
    env_file:
      - .env
    environment:
      APP_NAME: gateway
      COMMUNITY_SERVICE_ADDRESS: community:50051
      MESSENGER_SERVICE_ADDRESS: messenger:50051
      GAME_SERVICE_ADDRESS: game:50051
    depends_on:
      - community
      - messenger
      - game
    networks:
      - backend_akiora
    restart: unless-stopped



networks:
  backend_akiora:
    driver: bridge
